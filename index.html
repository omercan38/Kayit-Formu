<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Formu</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        input, button { display: block; width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { background-color: #0070f3; color: white; border: none; cursor: pointer; font-weight: bold; padding: 15px; }
        .kutu { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>Yeni Kayıt Formu</h2>
    <form id="form">
        <input type="text" id="isim_soyisim" placeholder="İsim Soyisim (Zorunlu)" required>
        
        <input type="tel" id="telefon" placeholder="Telefon (Örn: 0555-123-4567) (Zorunlu)" required>
        
        <input type="text" id="il" placeholder="İl (Zorunlu)" required>
        <input type="text" id="ilce" placeholder="İlçe (Zorunlu)" required>
        <input type="text" id="semt" placeholder="Semt (Zorunlu)" required>
        <input type="text" id="cadde" placeholder="Cadde (Zorunlu)" required>
        <input type="text" id="sokak" placeholder="Sokak (Zorunlu)" required>
        <input type="number" id="kisi_sayisi" placeholder="Toplam Kişi Sayısı (Zorunlu)" required min="1">
        
        <input type="tel" id="alternatif_telefon" placeholder="Alternatif Numarası (Örn: 0555-123-4567)">
        
        <button type="submit" id="kaydetBtn">Kaydet</button>
    </form>
    <p id="mesaj" style="font-weight: bold; font-size: 18px;"></p>

    <hr>

    <h2>Son Kayıtlar</h2>
    <button type="button" onclick="verileriGetir()" style="background-color: #333;">Verileri Yenile</button>
    <div id="liste">Henüz veri yok...</div>

    <script>
        // --- OTOMATİK TELEFON FORMATLAYICI (Sıfır bitişik) ---
        function telefonFormatla(e) {
            let val = e.target.value.replace(/\D/g, '');
            
            if (val.length > 0 && val[0] !== '0') {
                val = '0' + val;
            }
            
            val = val.substring(0, 11);
            
            // 0555-123-4567 şeklinde tireleri araya otomatik ekle
            let formatli = '';
            if (val.length > 0) formatli += val.substring(0, 4);
            if (val.length > 4) formatli += '-' + val.substring(4, 7);
            if (val.length > 7) formatli += '-' + val.substring(7, 11);
            
            e.target.value = formatli;
        }

        document.getElementById('telefon').addEventListener('input', telefonFormatla);
        document.getElementById('alternatif_telefon').addEventListener('input', telefonFormatla);
        // -------------------------------------

        document.getElementById('form').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            // Kullanıcı telefonu eksik girerse durdur (11 rakam + 2 tire = 13 karakter olmalı)
            const tel = document.getElementById('telefon').value;
            if(tel.length < 13) {
                document.getElementById('mesaj').innerText = "HATA: Lütfen telefonu eksiksiz (11 haneli) girin.";
                document.getElementById('mesaj').style.color = "red";
                return;
            }

            document.getElementById('mesaj').innerText = "Gönderiliyor, lütfen bekleyin...";
            document.getElementById('mesaj').style.color = "blue";
            
            try {
                const veri = {
                    isim_soyisim: document.getElementById('isim_soyisim').value,
                    telefon: tel,
                    il: document.getElementById('il').value,
                    ilce: document.getElementById('ilce').value,
                    semt: document.getElementById('semt').value,
                    cadde: document.getElementById('cadde').value,
                    sokak: document.getElementById('sokak').value,
                    kisi_sayisi: document.getElementById('kisi_sayisi').value,
                    alternatif_telefon: document.getElementById('alternatif_telefon').value
                };

                const response = await fetch('/api/kayit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(veri)
                });

                if (response.ok) {
                    document.getElementById('mesaj').innerText = "KAYIT BAŞARIYLA EKLENDİ!";
                    document.getElementById('mesaj').style.color = "green";
                    document.getElementById('form').reset();
                    verileriGetir();
                } else {
                    const hata = await response.json();
                    document.getElementById('mesaj').innerText = "SUNUCU HATASI: " + (hata.hata || "Bilinmeyen hata");
                    document.getElementById('mesaj').style.color = "red";
                }
            } catch (error) {
                document.getElementById('mesaj').innerText = "SİSTEME BAĞLANILAMADI: Arka plan dosyası bulunamadı!";
                document.getElementById('mesaj').style.color = "red";
            }
        });

        async function verileriGetir() {
            try {
                document.getElementById('liste').innerHTML = "Veriler yükleniyor...";
                const response = await fetch('/api/kayit');
                
                if(!response.ok) throw new Error("API bulunamadı");
                
                const data = await response.json();
                
                const listeDiv = document.getElementById('liste');
                listeDiv.innerHTML = `<p>Toplam Kayıt: <b>${data.toplam}</b></p>`;
                
                if (data.veriler && data.veriler.length > 0) {
                    data.veriler.forEach(kayit => {
                        listeDiv.innerHTML += `
                            <div class="kutu">
                                <b>${kayit.isim_soyisim}</b> - ${kayit.telefon}<br>
                                ${kayit.il}, ${kayit.ilce}, ${kayit.semt}, ${kayit.cadde}, ${kayit.sokak}<br>
                                Kişi Sayısı: ${kayit.kisi_sayisi} | Alternatif Tel: ${kayit.alternatif_telefon || "Yok"}
                            </div>
                        `;
                    });
                } else {
                    listeDiv.innerHTML += "Henüz kaydedilmiş bir veri yok.";
                }
            } catch (error) {
                document.getElementById('liste').innerHTML = "<b style='color:red;'>Liste çekilemedi. API dosyanızı kontrol edin.</b>";
            }
        }
        verileriGetir();
    </script>
</body>
</html>
